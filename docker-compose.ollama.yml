version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: argos_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 3

  argos:
    image: sigtrip/argoss:latest
    container_name: argos_main
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ARGOS_AI_MODE=auto
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs

volumes:
  ollama_data:
