name: "Build ARGOS Full APK (debug)"

on:
  push:
    branches: [main]
    paths:
      - "main_argos_local.py"
      - "buildozer_local.spec"
      - "src/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PIP_NO_USER: "1"
  PYTHONNOUSERSITE: "1"
  CYTHON_DEFAULT_LANGUAGE_LEVEL: "3"

jobs:
  build-apk:
    name: "Build Full ARGOS APK (debug)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y autoconf automake libtool build-essential \
            libffi-dev libssl-dev git zip unzip zlib1g-dev cmake ccache
      - name: Install buildozer
        run: pip install buildozer cython==0.29.36 "pyjnius>=1.6.1"
      - name: Disable pip user installs
        run: |
          mkdir -p ~/.config/pip
          printf '[global]\nno-user-site = true\n' > ~/.config/pip/pip.conf
      - name: Patch buildozer no --user
        run: |
          find / -path "*/buildozer/*.py" 2>/dev/null | xargs grep -rl '"--user"' 2>/dev/null | while read f; do
            sed -i 's/"--user", //g; s/, "--user"//g; s/"--user"//g' "$f" || true
          done || true
      - name: Set cython language_level
        run: |
          find .buildozer ~/.buildozer -name "*.pyx" -o -name "*.pxd" 2>/dev/null | while read f; do
            grep -q "language_level" "$f" || sed -i '1s/^/# cython: language_level=3\n/' "$f"
          done || true
      - name: Patch buildozer internals no --user
        run: |
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          find "$SITE" -name "*.py" 2>/dev/null | xargs grep -rl "\-\-user" 2>/dev/null | while read f; do
            sed -i 's/"--user"//g; s/"--user", //g; s/, "--user"//g' "$f" || true
            sed -i "s/'--user'//g; s/'--user', //g; s/, '--user'//g" "$f" || true
          done
          echo "Done"

      - name: Build APK
        timeout-minutes: 45
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          BUILDOZER_SPEC_FILENAME: buildozer_local.spec
        run: buildozer android debug 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "argos-apk-${{ github.run_number }}"
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "build-log-${{ github.run_number }}"
          path: /tmp/build.log
          if-no-files-found: ignore
          retention-days: 30
      - name: Patch buildozer internals no --user
        run: |
          SITE=$(python3 -c "import site; print(site.getsitepackages()[0])")
          find "$SITE/buildozer" "$SITE/pythonforandroid" -name "*.py" 2>/dev/null | while read f; do
            sed -i 's/"--user"//g; s/"--user", //g; s/, "--user"//g' "$f"
            sed -i "s/'--user'//g; s/'--user', //g; s/, '--user'//g" "$f"
          done
          echo "Buildozer patched"
