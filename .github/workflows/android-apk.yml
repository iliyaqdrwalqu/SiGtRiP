name: "Build ARGOS Full APK"

on:
  push:
    branches: [main]
    paths:
      - "main_argos_local.py"
      - "buildozer_local.spec"
      - "src/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PIP_USER: "0"
  PYTHONNOUSERSITE: "1"
  CYTHON_DEFAULT_LANGUAGE_LEVEL: "3"
  BUILDOZER_WARN_ON_ROOT: "0"

jobs:
  build-apk:
    name: "Build APK"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y autoconf automake libtool build-essential \
            libffi-dev libssl-dev git zip unzip zlib1g-dev cmake ccache
      - name: Setup venv
        run: |
          python -m venv venv
          echo "$PWD/venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$PWD/venv" >> $GITHUB_ENV
      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 "pyjnius>=1.6.1"
      - name: Patch pip no-user
        run: |
          mkdir -p ~/.config/pip
          printf '[global]\nno-user-site = true\n' > ~/.config/pip/pip.conf
          find / -path "*/pythonforandroid*" -name "*.py" 2>/dev/null | while read f; do
            sed -i "s/'--user'//g; s/\"--user\"//g" "$f" 2>/dev/null || true
          done
          find / -path "*/buildozer*" -name "*.py" 2>/dev/null | while read f; do
            sed -i "s/'--user'//g; s/\"--user\"//g" "$f" 2>/dev/null || true
          done
          echo "Patch done"
      - name: Build APK
        run: cd apps/argoss && buildozer android debug 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}
        timeout-minutes: 45
        env:
          BUILDOZER_SPEC_FILENAME: apps/argoss/buildozer.spec
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "argos-apk-${{ github.run_number }}"
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "build-log-${{ github.run_number }}"
          path: /tmp/build.log
          if-no-files-found: ignore
          retention-days: 30
