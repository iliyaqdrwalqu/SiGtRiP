
name: 📦 Publish to TestPyPI

# Publishes argos-universalsigtrip to TestPyPI via OIDC Trusted Publishing.
# No PYPI_TOKEN required — authentication is handled by GitHub's OIDC provider.
# One-time setup on https://test.pypi.org (Trusted Publishing):
#   1. Log in and go to your account → Publishing → Add a new publisher
#   2. Fill in:
#      - PyPI project name: argos-universalsigtrip
#      - Owner:             iliyaqdrwalqu
#      - Repository:        SiGtRiP
#      - Workflow file path:  .github/workflows/publish_testpypi.yml
#      - Environment name:    testpypi


on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write  # Required to commit version bump
  id-token: write  # Required for OIDC Trusted Publishing

jobs:
  publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    env:
      PROJECT_DIR: ${{ github.workspace }}
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Auto-bump patch version
        run: python bump_version.py

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml build.py
          git diff --cached --quiet || git commit -m "chore: bump version [skip ci]"
          git pull --rebase origin HEAD
          git push

      - name: Build package
        # Run from a temp directory so that the local build.py in the repo
        # does not shadow the pypa-build module needed to create dist artifacts.
        run: |
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          cd "$tmpdir"
          python -m build --outdir "${DIST_DIR}" --sdist --wheel "${PROJECT_DIR}"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ${{ env.DIST_DIR }}
