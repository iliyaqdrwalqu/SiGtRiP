
name: 📦 Publish to TestPyPI

# Publishes argos-universalsigtrip to TestPyPI via OIDC Trusted Publishing.
# No PYPI_TOKEN required — authentication is handled by GitHub's OIDC provider.
# One-time setup on https://test.pypi.org (Trusted Publishing):
#   1. Log in and go to your account → Publishing → Add a new publisher
#   2. Fill in:
#      - PyPI project name: argos-universalsigtrip
#      - Owner:               iliyaqdrwalqu
#      - Repository:          SiGtRiP
#      - Workflow file path:  .github/workflows/publish_testpypi.yml
#      - Environment name:    testpypi

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC Trusted Publishing

jobs:
  publish:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        # Run from the parent directory so that the local build.py in the repo
        # does not shadow the pypa-build module needed to create dist artifacts.
        run: |
          if [ -z "$GITHUB_WORKSPACE" ]; then
            echo "GITHUB_WORKSPACE is not set" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            /*) ;;
            *) echo "GITHUB_WORKSPACE must be absolute" >&2; exit 1 ;;
          esac
          case "$GITHUB_WORKSPACE" in
            /home/runner/work/*) ;;
            *) echo "Unexpected workspace path: $GITHUB_WORKSPACE" >&2; exit 1 ;;
          esac
          DIST_PATH="${GITHUB_WORKSPACE}/dist"
          rm -rf "$DIST_PATH"
          cd "${GITHUB_WORKSPACE}/.."
          python -m build "${GITHUB_WORKSPACE}" --outdir "${GITHUB_WORKSPACE}/dist"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
