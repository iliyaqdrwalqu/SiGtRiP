# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        pip install -r requirements.txx
        
- name: Build package
  run: |
    set -euxo pipefail
    python -m pip install --upgrade build
    rm -rf "${GITHUB_WORKSPACE}/dist"
    tmpdir="$(mktemp -d)"
    trap 'rm -rf "${tmpdir}"' EXIT
    # python build.py  # удалено, так как файла нет
    cd "$tmpdir"
    python -m build --outdir "${GITHUB_WORKSPACE}/dist" --sdist --wheel "${GITHUB_WORKSPACE}"
    echo "Build contents:"
    ls -l "${GITHUB_WORKSPACE}/dist"
    

    - name: List artifacts
      run: |
        if [ ! -d dist ]; then
          echo "dist directory does not exist!"
          exit 1
        fi
        if [ -z "$(ls -A dist)" ]; then
          echo "dist is empty!"
          exit 1
        else
          ls dist
        fi
