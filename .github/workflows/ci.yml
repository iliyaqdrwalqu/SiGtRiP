# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build package
      run: |
        set -euxo pipefail
        # The repository contains a local build.py script that scaffolds files but
        # does not create a dist/ directory. Run it first, then use the real
        # packaging tool (pypa/build) while removing the current directory from
        # sys.path to avoid the local module shadowing the installed package.
        python build.py
        python -m pip install --upgrade build
        python - <<'PY'
        import sys, runpy

        # Drop current working directory so the installed `build` package is used
        # instead of the local build.py module.
        sys.path = sys.path[1:]
        sys.argv = ["build", "--outdir", "dist"]
        runpy.run_module("build", run_name="__main__")
        PY

    - name: List artifacts
      run: |
        if [ ! -d dist ]; then
          echo "dist directory does not exist!"
          exit 1
        fi
        if [ -z "$(ls -A dist)" ]; then
          echo "dist is empty!"
          exit 1
        else
          ls dist
        fi
