# .github/workflows/ci.yml

name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        set -euxo pipefail
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build package
      run: |
        set -euxo pipefail
        python -m build --outdir dist

    - name: List artifacts
      run: |
        if [ ! -d dist ]; then
          echo "dist directory does not exist!"
          exit 1
        fi
        if [ -z "$(ls -A dist)" ]; then
          echo "dist is empty!"
          exit 1
        else
          ls dist
        fi
