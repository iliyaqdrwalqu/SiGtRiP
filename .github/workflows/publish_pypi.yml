name: 🚀 Publish to PyPI

# Publishes argos-universalsigtrip to PyPI via OIDC Trusted Publishing.
# No PYPI_TOKEN required — authentication is handled by GitHub's OIDC provider.
#
# One-time setup on pypi.org:
#   1. Log in to https://pypi.org
#   2. Go to your account → Publishing → Add a new publisher
#   3. Fill in:
#      - PyPI project name: argos-universalsigtrip
#      - Owner:             iliyaqdrwalqu
#      - Repository:        SiGtRiP
#      - Workflow file:     publish_pypi.yml
#      - Environment name:  (leave blank)
#
# Recommended: run publish_testpypi.yml first to validate the package on
# TestPyPI before publishing to the production PyPI index.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC Trusted Publishing

jobs:
  publish-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        # Run from the parent directory so that the local build.py in the repo
        # does not shadow the pypa-build module needed to create dist artifacts.
        run: |
          if [ -z "$GITHUB_WORKSPACE" ]; then
            echo "GITHUB_WORKSPACE is not set" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            /*) ;;
            *) echo "GITHUB_WORKSPACE must be absolute" >&2; exit 1 ;;
          esac
          case "$GITHUB_WORKSPACE" in
            /home/runner/work/*) ;;
            *) echo "Unexpected workspace path: $GITHUB_WORKSPACE" >&2; exit 1 ;;
          esac
          DIST_PATH="${GITHUB_WORKSPACE}/dist"
          rm -rf "$DIST_PATH"
          cd "${GITHUB_WORKSPACE}/.."
          python -m build "${GITHUB_WORKSPACE}" --outdir "${GITHUB_WORKSPACE}/dist"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
