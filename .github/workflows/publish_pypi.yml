name: 🚀 Publish to TestPyPI

# Publishes argos-universalsigtrip to TestPyPI via OIDC Trusted Publishing.
# No PYPI_TOKEN required — authentication is handled by GitHub's OIDC provider.
#
# One-time setup on test.pypi.org:
#   1. Log in to https://test.pypi.org
#   2. Go to your account → Publishing → Add a new publisher
#   3. Fill in:
#      - PyPI project name: argos-universalsigtrip
#      - Owner:             iliyaqdrwalqu
#      - Repository:        SiGtRiP
#      - Workflow file:     publish_pypi.yml
#      - Environment name:  testpypi

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write  # Required to commit version bump
  id-token: write  # Required for OIDC Trusted Publishing

jobs:
  publish-pypi:
    name: Build and publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    env:
      PROJECT_DIR: ${{ github.workspace }}
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Auto-bump patch version
        run: python bump_version.py

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml build.py
          git diff --cached --quiet || git commit -m "chore: bump version [skip ci]"
          git pull --rebase origin HEAD
          git push

      - name: Build package
        # Run from a temp directory so that the local build.py in the repo
        # does not shadow the pypa-build module needed to create dist artifacts.
        run: |
          if [ -z "$GITHUB_WORKSPACE" ]; then
            echo "GITHUB_WORKSPACE is not set" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            /*) ;;
            *) echo "GITHUB_WORKSPACE must be absolute" >&2; exit 1 ;;
          esac
          rm -rf "${DIST_DIR}"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "${tmpdir}"' EXIT
          cd "$tmpdir"
          python -m build "${PROJECT_DIR}" --outdir "${DIST_DIR}" --sdist --wheel

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ${{ env.DIST_DIR }}
