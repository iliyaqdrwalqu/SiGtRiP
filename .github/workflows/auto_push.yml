name: "\U0001f680 Auto Push Commit to Repo"

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message"
        required: false
        default: "chore: auto commit [skip ci]"
      files:
        description: "Files to add (space-separated; empty = all)"
        required: false
        default: ""
      branch:
        description: "Branch (empty = current)"
        required: false
        default: ""

  schedule:
    - cron: "0 0,6,12,18 * * *"

  workflow_run:
    workflows: ["\U0001f3d7\ufe0f Build ARGOS Client APK"]
    types: [completed]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_NO_USER: "1"

jobs:
  auto-push:
    name: Commit & Push changes
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      # ── Форматирование перед пушем ────────────────────────────────
      - name: Install black
        run: pip install black

      - name: Auto-format Python files
        run: |
          black src/ main*.py telegram_bot.py git_push.py \
            --line-length 100 \
            --target-version py310 \
            2>/dev/null || true

      - name: Configure git identity
        run: |
          git config user.name  "ARGOS AutoPush"
          git config user.email "argos@sigtrip.dev"

      - name: Check for changes
        id: check_changes
        run: |
          git status --short
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage files
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          FILES="${{ github.event.inputs.files }}"
          if [ -n "$FILES" ]; then
            for f in $FILES; do
              [ -e "$f" ] && git add -- "$f" && echo "Added: $f" || echo "Not found: $f"
            done
          else
            git add -A
            echo "Added all changes"
          fi

      - name: Check staged changes
        id: check_staged
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          STAGED=$(git diff --cached --name-only)
          if [ -z "$STAGED" ]; then
            echo "staged=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit"
          else
            echo "staged=true" >> "$GITHUB_OUTPUT"
            echo "Staged files:"
            echo "$STAGED"
          fi

      - name: Commit changes
        if: >
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.check_staged.outputs.staged == 'true'
        run: |
          MSG="${{ github.event.inputs.commit_message }}"
          if [ -z "$MSG" ]; then
            MSG="chore: auto commit [skip ci]"
          fi
          git commit -m "$MSG"
          echo "Commit created: $MSG"

      - name: Push changes
        if: >
          steps.check_changes.outputs.has_changes == 'true' &&
          steps.check_staged.outputs.staged == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [ -z "$BRANCH" ]; then
            BRANCH="${{ github.ref_name }}"
          fi
          git push origin "$BRANCH"
          echo "Pushed to branch: $BRANCH"

      - name: Nothing to push
        if: >
          steps.check_changes.outputs.has_changes == 'false' ||
          steps.check_staged.outputs.staged == 'false'
        run: echo "Repository is up to date, no push required."
