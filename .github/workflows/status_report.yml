name: "\U0001f4ca ARGOS Status Report"

on:
  workflow_dispatch:
    inputs:
      format:
        description: "Report format"
        required: false
        default: "markdown"
        type: choice
        options:
          - markdown
          - json
          - console

  schedule:
    - cron: "0 9 * * *"

  workflow_run:
    workflows: ["\U0001f3d7\ufe0f Build ARGOS Client APK"]
    types: [completed]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_NO_USER: "1"
  PIP_ROOT_USER_ACTION: "ignore"

jobs:
  report:
    name: Generate Status Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install report dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml requests

      - name: Install buildozer (tool check)
        run: pip install buildozer || true

      - name: Install adb (tool check)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends android-tools-adb || true

      - name: Install project dependencies (best-effort)
        run: pip install -r requirements.txt || true

      - name: Check missing files
        id: missing_check
        run: |
          python3 - <<'PYEOF'
          import os, sys
          from pathlib import Path

          REQUIRED = {
              "main.py":                          "Main module (GUI / web / terminal)",
              "requirements.txt":                 "Python dependencies",
              "buildozer.spec":                   "APK build configuration",
              "telegram_bot.py":                  "Telegram bot with chat history",
              "src/argos_model.py":               "Local neural network",
              "git_push.py":                      "Auto-push script",
              "README.md":                        "Documentation",
              ".github/workflows/build_apk.yml":  "CI APK build",
              ".github/workflows/auto_push.yml":  "CI auto-push",
              ".github/workflows/status_report.yml": "CI status report",
          }

          missing = []
          found   = []
          for path, desc in REQUIRED.items():
              if Path(path).exists():
                  found.append((path, desc))
              else:
                  missing.append((path, desc))

          print("=== FILE STATUS ===")
          for path, desc in found:
              print(f"  [OK]      {path:<45} — {desc}")
          for path, desc in missing:
              print(f"  [MISSING] {path:<45} — {desc}")

          print(f"\nResult: {len(found)} OK / {len(missing)} MISSING")

          # Write to GitHub step summary
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("## File Status\n\n")
                  f.write("| Status | File | Description |\n")
                  f.write("|--------|------|-------------|\n")
                  for p, d in found:
                      f.write(f"| ✅ OK | `{p}` | {d} |\n")
                  for p, d in missing:
                      f.write(f"| ❌ MISSING | `{p}` | {d} |\n")

          if missing:
              with open(os.environ.get("GITHUB_OUTPUT", "/dev/null"), "a") as f:
                  f.write(f"missing_count={len(missing)}\n")
          PYEOF

      - name: Determine report format
        id: fmt
        run: |
          FMT="${{ github.event.inputs.format }}"
          [ -z "$FMT" ] && FMT="markdown"
          echo "format=$FMT" >> "$GITHUB_OUTPUT"
          echo "Report format: $FMT"

      - name: Run status report (console preview)
        run: python status_report.py || echo "status_report.py not found, skipping"

      - name: Run status report (Markdown)
        if: steps.fmt.outputs.format == 'markdown' || steps.fmt.outputs.format == ''
        run: python status_report.py --md --out status_report.md || true

      - name: Run status report (JSON)
        if: steps.fmt.outputs.format == 'json'
        run: python status_report.py --json --out status_report.json || true

      - name: Publish to GitHub Step Summary
        if: steps.fmt.outputs.format != 'json'
        run: |
          if [ -f status_report.md ]; then
            cat status_report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Markdown report artifact
        if: always() && steps.fmt.outputs.format != 'json'
        uses: actions/upload-artifact@v7
        with:
          name: "argos-status-report-md-${{ github.run_number }}"
          path: status_report.md
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload JSON report artifact
        if: always() && steps.fmt.outputs.format == 'json'
        uses: actions/upload-artifact@v7
        with:
          name: "argos-status-report-json-${{ github.run_number }}"
          path: status_report.json
          if-no-files-found: ignore
          retention-days: 30
